<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>

<div class="container">
    <h2>Contact Us - Form</h2>

    <form id="contact-form">

        <div class="form-group">
            <label for="name">Full Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required
            >
        </div>

        <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input
                type="tel"
                id="mobile"
                placeholder="Enter your mobile number"
                required
            >
        </div>

        <div class="form-group">
            <label for="sender-email">Your Email</label>
            <input
                type="email"
                id="sender-email"
                placeholder="Enter your email"
                required
            >
        </div>

        <div class="hidden">
            <label for="receiver-email">Company Email</label>
            <input
                type="email"
                id="receiver-email"
                value="sukritmajumdar18@gmail.com"
                readonly
            >
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea
                id="message"
                placeholder="Write your message regarding why you are contacting the company..."
                required
            ></textarea>
        </div>

        <button type="submit" id="submit-btn">
            Send Message
        </button>

    </form>

    <hr>

    <h3>Submitted Messages</h3>

    <div id="messages">
        <!-- Sent messages will be rendered here -->
    </div>
</div>

<!-- EmailJS Library -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
